<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }

        /* تصميم البطاقات */
        .glass-card {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- تحسين الفورم --- */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.1rem;
        }

        .input-field {
            width: 100%;
            padding: 14px 45px 14px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: 'Tajawal';
        }

        /* حركة الأيقونة والمربع عند النقر */
        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .input-field:focus + i {
            color: var(--primary);
            transform: translateY(-50%) scale(1.2) rotate(-10deg); /* حركة التفاف خفيفة */
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        button:hover {
            background: var(--primary-light);
            box-shadow: 0 6px 15px rgba(79, 70, 229, 0.4);
        }

        /* --- تحسين الرسم البياني --- */
        .chart-wrapper {
            width: 100%;
            height: 300px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="glass-card">
            <h2><i class="fas fa-user-circle" style="color: var(--primary);"></i> بيانات التسجيل</h2>
            <form>
                <div class="input-group">
                    <input type="text" class="input-field" placeholder="اسم المستخدم" required>
                    <i class="fas fa-user"></i>
                </div>
                
                <div class="input-group">
                    <input type="email" class="input-field" placeholder="البريد الإلكتروني" required>
                    <i class="fas fa-envelope"></i>
                </div>
                
                <div class="input-group">
                    <input type="password" class="input-field" placeholder="كلمة المرور" required>
                    <i class="fas fa-shield-halved"></i>
                </div>

                <button type="button">تحديث البيانات</button>
            </form>
        </div>

        <div class="glass-card">
            <h2><i class="fas fa-chart-line" style="color: #10b981;"></i> تقرير الأداء</h2>
            <div class="chart-wrapper">
                <canvas id="improvedChart"></canvas>
            </div>
        </div>

    </div>

    <script>
        // إعدادات الرسم البياني المطور
        const ctx = document.getElementById('improvedChart').getContext('2d');
        
        // إنشاء تدرج لوني احترافي للمنحنى
        const bgGradient = ctx.createLinearGradient(0, 0, 0, 400);
        bgGradient.addColorStop(0, 'rgba(79, 70, 229, 0.4)');
        bgGradient.addColorStop(1, 'rgba(79, 70, 229, 0)');

        const data = {
            labels: ['السبت', 'الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس'],
            datasets: [{
                label: 'معدل التفاعل',
                data: [35, 55, 40, 75, 50, 90],
                fill: true,
                backgroundColor: bgGradient,
                borderColor: '#4f46e5',
                borderWidth: 4,
                tension: 0.4, // لجعل الخط منحني بشكل جمالي
                pointBackgroundColor: '#fff',
                pointBorderColor: '#4f46e5',
                pointBorderWidth: 3,
                pointRadius: 5,
                pointHoverRadius: 8,
                pointHoverBorderWidth: 4
            }]
        };

        const config = {
            type: 'line',
            data: data,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false } // إخفاء المربعات العلوية لشكل أنظف
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: '#f1f5f9', drawBorder: false },
                        ticks: { font: { family: 'Tajawal' } }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { font: { family: 'Tajawal' } }
                    }
                },
                animation: {
                    duration: 2500,
                    easing: 'easeOutElastic' // حركة ارتدادية جميلة عند الظهور
                }
            }
        };

        new Chart(ctx, config);
    </script>
</body>
</html>
